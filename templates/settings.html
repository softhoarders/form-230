{% extends 'base.html' %}

{% block content %}
<div class="intro-fade">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h1>Setări ONG</h1>
        <a href="/admin" class="btn" style="background:var(--border);"><small>Înapoi la Dashboard</small></a>
    </div>

    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h3>Configurare Date ONG</h3>
        <p class="text-muted mb-2"><small>Aceste date vor fi adăugate automat pe PDF-ul generat.</small></p>
        
        <form action="/admin/config" method="POST" enctype="multipart/form-data">
            <div class="form-group mb-1">
                <label>Nume ONG</label>
                <input type="text" name="ong_name" value="{{ config.ong_name }}" required>
            </div>
            <div class="form-group mb-1">
                <label>Cod de Identificare (CUI)</label>
                <input type="text" name="ong_cui" value="{{ config.ong_cui }}" required>
            </div>
            <div class="form-group mb-1">
                <label>Cont Bancar (IBAN)</label>
                <input type="text" name="ong_iban" value="{{ config.ong_iban }}" required>
            </div>
            <div class="form-group mb-1">
                <label>Sediul (Adresa)</label>
                <input type="text" name="ong_sediu" value="{{ config.ong_sediu }}" required>
            </div>
            <div class="form-group mb-1">
                <label>Banca</label>
                <input type="text" name="ong_cont_bancar" value="{{ config.ong_cont_bancar }}" required>
            </div>
            <div class="form-group mb-2">
                <label>Semnătură curentă (sau Desenează mai jos pentru a o schimba)</label>
                {% if config.signature_base64 %}
                <div style="margin-bottom: 10px;">
                    <img src="{{ config.signature_base64 }}" alt="Signature" style="max-height: 50px; background: white; padding: 5px; border: 1px dashed #ccc;">
                </div>
                {% endif %}
                <div class="signature-container" style="border: 1px solid #ccc; background: #fff; width: 100%; max-width: 400px; height: 150px; border-radius: 8px; position: relative; margin-bottom: 10px;">
                    <canvas id="admin-signature-pad" style="width: 100%; height: 100%; border-radius: 8px; touch-action: none;"></canvas>
                </div>
                <button type="button" id="clear-admin-signature" class="btn btn-secondary" style="font-size: 0.8rem; padding: 5px 10px;">Șterge Semnătura</button>
                <input type="hidden" name="signature_base64" id="signature_base64">
            </div>
            <button type="submit" class="btn btn-primary mt-1" style="background-color: var(--primary);">Salvează</button>
        </form>
    </div>
</div>
{% endblock %}
